<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GVault">
<title>GVault</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111111;
    --surface: #1c1c1c;
    --surface2: #222222;
    --surface3: #2a2a2a;
    --green: #004526;
    --green-light: #00a652;
    --text: #ffffff;
    --text2: #888888;
    --text3: #555555;
    --danger: #cc3333;
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; flex-direction: column; }
  .screen.active { display: flex; }

  /* LOGIN */
  #login { align-items: center; justify-content: center; padding: 40px 28px; }
  .login-logo { width: 80px; height: 80px; background: var(--green); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 36px; margin-bottom: 24px; }
  .login-title { font-size: 28px; font-weight: 600; margin-bottom: 6px; }
  .login-sub { font-size: 14px; color: var(--text2); margin-bottom: 36px; text-align: center; }
  .field-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; margin-left: 2px; }
  .field { width: 100%; background: var(--surface3); border: none; border-radius: var(--radius-sm); padding: 14px 16px; font-size: 16px; color: var(--text); font-family: 'DM Sans', sans-serif; margin-bottom: 16px; outline: none; }
  .field:focus { box-shadow: 0 0 0 2px var(--green); }
  .btn { width: 100%; padding: 15px; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
  .btn:active { opacity: 0.8; }
  .btn-green { background: var(--green); color: white; margin-bottom: 10px; }
  .btn-ghost { background: transparent; color: #aaffcc; border: 1px solid var(--green); }
  .error-msg { color: #ff5555; font-size: 13px; margin-bottom: 12px; display: none; }

  /* DASHBOARD */
  #dashboard { padding: 0; }
  .topbar { background: #161616; padding: 52px 20px 16px; display: flex; align-items: center; justify-content: space-between; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .topbar-logo { width: 32px; height: 32px; background: var(--green); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .topbar-title { font-size: 17px; font-weight: 600; }
  .btn-logout { background: var(--surface3); border: none; color: var(--text2); font-size: 13px; padding: 7px 14px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

  /* ADD FORM */
  .add-section { background: var(--surface2); padding: 16px; margin-bottom: 1px; }
  .add-fields { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .add-field { background: var(--surface3); border: none; border-radius: var(--radius-sm); padding: 12px 14px; font-size: 14px; color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; width: 100%; }
  .add-field::placeholder { color: var(--text3); }
  .add-field:focus { box-shadow: 0 0 0 2px var(--green); }
  .add-btns { display: flex; gap: 10px; }
  .btn-sm { flex: 1; padding: 11px; border: none; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: opacity 0.2s; }
  .btn-sm:active { opacity: 0.8; }
  .btn-generate { background: #1a3a5c; color: #cccccc; border: 1px solid #333; }
  .btn-add { background: var(--green); color: white; }

  /* PASSWORD LIST */
  .list-section { flex: 1; padding: 12px 16px; overflow-y: auto; }
  .empty-state { text-align: center; color: var(--text2); padding: 60px 20px; font-size: 15px; }
  .pwd-card { background: var(--surface2); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; position: relative; transition: background 0.15s; }
  .pwd-card.selected { background: var(--green); }
  .pwd-site { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .pwd-login { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
  .pwd-bottom { display: flex; align-items: center; justify-content: space-between; }
  .pwd-masked { font-size: 14px; letter-spacing: 2px; color: var(--text2); }
  .pwd-visible { font-size: 13px; color: var(--text); word-break: break-all; }
  .pwd-actions { display: flex; gap: 8px; }
  .pwd-btn { background: var(--surface3); border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: background 0.15s; }
  .pwd-btn:active { background: #3a3a3a; }
  .pwd-btn.danger:active { background: #2a1515; color: #ff6666; }
  .pwd-date { font-size: 11px; color: var(--text3); margin-top: 8px; }

  /* TOAST */
  .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: var(--green); color: white; padding: 12px 24px; border-radius: 20px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
  .toast.show { opacity: 1; }

  /* LOADING */
  .loading { text-align: center; color: var(--text2); padding: 30px; font-size: 14px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="login-logo">🔐</div>
  <div class="login-title">GVault</div>
  <div class="login-sub">Connecte-toi pour accéder à ton coffre</div>

  <div style="width:100%;max-width:380px">
    <div class="field-label">Email</div>
    <input class="field" id="loginEmail" type="email" placeholder="exemple@email.com" autocomplete="email">
    <div class="field-label">Mot de passe maître</div>
    <input class="field" id="loginPassword" type="password" placeholder="••••••••" autocomplete="current-password">
    <div class="error-msg" id="loginError">Email ou mot de passe incorrect</div>
    <button class="btn btn-green" onclick="login()">Se connecter</button>
    <button class="btn btn-ghost" onclick="showRegister()">Créer un compte</button>
  </div>
</div>

<!-- REGISTER -->
<div id="register" class="screen" style="align-items:center;justify-content:center;padding:40px 28px;">
  <div class="login-logo">🔐</div>
  <div class="login-title">Créer un compte</div>
  <div class="login-sub" style="margin-bottom:36px">Bienvenue sur GVault</div>

  <div style="width:100%;max-width:380px">
    <div class="field-label">Email</div>
    <input class="field" id="regEmail" type="email" placeholder="exemple@email.com">
    <div class="field-label">Mot de passe maître</div>
    <input class="field" id="regPassword" type="password" placeholder="••••••••">
    <div class="error-msg" id="regError"></div>
    <button class="btn btn-green" onclick="register()" style="margin-bottom:10px">Créer mon compte</button>
    <button class="btn btn-ghost" onclick="showLogin()">Déjà un compte</button>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">🔐</div>
      <div class="topbar-title">GVault</div>
    </div>
    <button class="btn-logout" onclick="logout()">Déconnexion</button>
  </div>

  <div class="add-section">
    <div class="add-fields">
      <input class="add-field" id="addSite" placeholder="🌐 Site web">
      <input class="add-field" id="addLogin" placeholder="👤 Login / Email">
      <input class="add-field" id="addPassword" placeholder="🔑 Mot de passe">
    </div>
    <div class="add-btns">
      <button class="btn-sm btn-generate" onclick="generate()">⚡ Générer</button>
      <button class="btn-sm btn-add" onclick="addPassword()">➕ Ajouter</button>
    </div>
  </div>

  <div class="list-section" id="passwordList">
    <div class="loading">Chargement...</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://gvault-production.up.railway.app';
let token = localStorage.getItem('gvault_token') || '';

if (token) showDashboard();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showLogin() { showScreen('login'); }
function showRegister() { showScreen('register'); }

async function login() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const err = document.getElementById('loginError');
  err.style.display = 'none';

  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    if (res.ok) {
      const data = await res.json();
      token = data.token;
      localStorage.setItem('gvault_token', token);
      showDashboard();
    } else {
      err.style.display = 'block';
    }
  } catch {
    err.textContent = 'Impossible de contacter le serveur';
    err.style.display = 'block';
  }
}

async function register() {
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const err = document.getElementById('regError');

  try {
    const res = await fetch(`${API}/register`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    if (res.ok) {
      showToast('Compte créé !');
      showLogin();
    } else {
      const msg = await res.text();
      err.textContent = msg.replace(/"/g, '');
      err.style.display = 'block';
    }
  } catch {
    err.textContent = 'Erreur serveur';
    err.style.display = 'block';
  }
}

function logout() {
  token = '';
  localStorage.removeItem('gvault_token');
  showLogin();
}

function showDashboard() {
  showScreen('dashboard');
  loadPasswords();
}

async function loadPasswords() {
  const list = document.getElementById('passwordList');
  list.innerHTML = '<div class="loading">Chargement...</div>';

  try {
    const res = await fetch(`${API}/passwords`, {
      headers: {'Authorization': `Bearer ${token}`}
    });
    if (!res.ok) { logout(); return; }
    const passwords = await res.json();

    if (passwords.length === 0) {
      list.innerHTML = '<div class="empty-state">Aucun mot de passe enregistré</div>';
      return;
    }

    list.innerHTML = passwords.map(p => `
      <div class="pwd-card" id="card-${p.id}">
        <div class="pwd-site">${p.siteName}</div>
        <div class="pwd-login">${p.login}</div>
        <div class="pwd-bottom">
          <span class="pwd-masked" id="pwd-text-${p.id}">••••••••</span>
          <div class="pwd-actions">
            <button class="pwd-btn" onclick="toggleReveal(${p.id}, '${encodeURIComponent(p.password)}')">👁</button>
            <button class="pwd-btn" onclick="copyPwd('${encodeURIComponent(p.password)}')">📋</button>
            <button class="pwd-btn danger" onclick="deletePwd(${p.id})">🗑</button>
          </div>
        </div>
        <div class="pwd-date">${new Date(p.createdAt).toLocaleDateString('fr-FR')}</div>
      </div>
    `).join('');
  } catch {
    list.innerHTML = '<div class="empty-state">Erreur de chargement</div>';
  }
}

function toggleReveal(id, encodedPwd) {
  const el = document.getElementById(`pwd-text-${id}`);
  const pwd = decodeURIComponent(encodedPwd);
  if (el.textContent === '••••••••') {
    el.textContent = pwd;
    el.className = 'pwd-visible';
  } else {
    el.textContent = '••••••••';
    el.className = 'pwd-masked';
  }
}

function copyPwd(encodedPwd) {
  const pwd = decodeURIComponent(encodedPwd);
  navigator.clipboard.writeText(pwd).then(() => showToast('Mot de passe copié !'));
}

async function deletePwd(id) {
  if (!confirm('Supprimer ce mot de passe ?')) return;
  const res = await fetch(`${API}/passwords/${id}`, {
    method: 'DELETE',
    headers: {'Authorization': `Bearer ${token}`}
  });
  if (res.ok) { showToast('Supprimé !'); loadPasswords(); }
}

async function generate() {
  const res = await fetch(`${API}/generate?type=words&words=4`);
  if (res.ok) {
    const data = await res.json();
    document.getElementById('addPassword').value = data.password;
  }
}

async function addPassword() {
  const site = document.getElementById('addSite').value;
  const login = document.getElementById('addLogin').value;
  const password = document.getElementById('addPassword').value;

  if (!site || !login || !password) { showToast('Remplis tous les champs !'); return; }

  const res = await fetch(`${API}/passwords`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${token}`},
    body: JSON.stringify({siteName: site, login, password})
  });

  if (res.ok) {
    document.getElementById('addSite').value = '';
    document.getElementById('addLogin').value = '';
    document.getElementById('addPassword').value = '';
    showToast('Mot de passe ajouté !');
    loadPasswords();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
